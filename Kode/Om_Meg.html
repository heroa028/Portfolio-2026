    <!-- ✅ SCRIPTET SOM BYTTER ROSA/LILLA TIL GRØNT -->
    <!--Dette er laget av AI-->
    <script>
        const knapp = document.querySelector(".FargeGreie");
        let greenMode = false;

        knapp.addEventListener("click", () => {
            if (!greenMode) {
                document.documentElement.style.setProperty("--rosa", "#6aff8d");
                document.documentElement.style.setProperty("--lilla", "#1f7a3a");
            } else {
                document.documentElement.style.setProperty("--rosa", "#BF67B1");
                document.documentElement.style.setProperty("--lilla", "#902A7F");
            }

            greenMode = !greenMode;
        });
    </script>

    <!--
[Bruker klikker på Fargeendreren]
                 │
                 ▼
      [JavaScript fanger klikket]
                 │
                 ▼
[Script sjekker greenMode (rosa/lilla eller grønn)]
                 │
       ┌─────────┴─────────┐
       │                   │
   Ikke grønn           Grønn
       │                   │
       ▼                   ▼
[Set --rosa til grønn]  [Set --rosa til rosa]
[Set --lilla til grønn] [Set --lilla til lilla]
       │                   │
       └─────────┬─────────┘
                 ▼
  [CSS-variabler oppdateres live]
                 │
                 ▼
[Alle elementer som bruker var(--rosa/--lilla) endres på siden]
                 │
                 ▼
  [Nettsiden viser nye farger umiddelbart]
                 │
                 ▼
  [greenMode byttes for neste klikk]
  
  
  :root= hele dokumentet
  

  --Lilla og --Rosa er variabler  (x og y feks)

  .Navbar2 {
  background-color: var(--lilla);
}

.Overskrift1 {
  color: var(--rosa);
} 
  betyr bruk fargen som ligger i variablen (--Rosa eller --lilla)

  -->
