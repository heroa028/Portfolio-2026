    <!--Slideshow laget av AI-->
  <div class="my-slideshow">
  <div class="my-slides">
    <img src="Bilder/PingMeR1.png" class="active">
    <img src="Bilder/PingMeG1.png">
    <img src="Bilder/PingMeS1.png">
  </div>

  <button class="my-prev">&#10094;</button>
  <button class="my-next">&#10095;</button>
</div>

<!-- Fullscreen Lightbox -->
<div class="my-lightbox" id="myLightbox">
  <span class="my-close">&times;</span>
  <img id="myLightboxImg">
  <button class="my-lightbox-prev">&#10094;</button>
  <button class="my-lightbox-next">&#10095;</button>
</div>


<script>
  const slides = document.querySelectorAll('.my-slideshow img');
  const prev = document.querySelector('.my-prev');
  const next = document.querySelector('.my-next');
  let index = 0;

  function showSlide(i) {
    slides.forEach(s => s.classList.remove('active'));
    slides[i].classList.add('active');
  }

  prev.addEventListener('click', () => {
    index = (index - 1 + slides.length) % slides.length;
    showSlide(index);
  });

  next.addEventListener('click', () => {
    index = (index + 1) % slides.length;
    showSlide(index);
  });

  /* LIGHTBOX */
  const lightbox = document.getElementById('myLightbox');
  const lightboxImg = document.getElementById('myLightboxImg');
  const closeBtn = document.querySelector('.my-close');
  const lbPrev = document.querySelector('.my-lightbox-prev');
  const lbNext = document.querySelector('.my-lightbox-next');

  slides.forEach((img, i) => {
    img.addEventListener('click', () => {
      index = i;
      openLightbox();
    });
  });

  function openLightbox() {
    lightbox.style.display = "flex";
    lightboxImg.src = slides[index].src;
  }

  function closeLightbox() {
    lightbox.style.display = "none";
  }

  closeBtn.addEventListener('click', closeLightbox);

  lbPrev.addEventListener('click', () => {
    index = (index - 1 + slides.length) % slides.length;
    openLightbox();
  });

  lbNext.addEventListener('click', () => {
    index = (index + 1) % slides.length;
    openLightbox();
  });
</script>

    <script>
        const knapp = document.querySelector(".FargeGreie");
        let greenMode = false;

        knapp.addEventListener("click", () => {
            if (!greenMode) {
                document.documentElement.style.setProperty("--rosa", "#6aff8d");
                document.documentElement.style.setProperty("--lilla", "#1f7a3a");
            } else {
                document.documentElement.style.setProperty("--rosa", "#BF67B1");
                document.documentElement.style.setProperty("--lilla", "#902A7F");
            }

            greenMode = !greenMode;
        });
    </script>
