<!-- ✅ SCRIPTET SOM BYTTER ROSA/LILLA TIL GRØNT -->
<!--Dette er laget av AI-->
<script>
    const knapp = document.querySelector(".FargeGreie");
    let greenMode = false;

    knapp.addEventListener("click", () => {
        if (!greenMode) {
            document.documentElement.style.setProperty("--rosa", "#6aff8d");
            document.documentElement.style.setProperty("--lilla", "#1f7a3a");
        } else {
            document.documentElement.style.setProperty("--rosa", "#BF67B1");
            document.documentElement.style.setProperty("--lilla", "#902A7F");
        }

        greenMode = !greenMode;
    });
</script>
